name: Bootstrap KC 666 and Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Write project files
        env:
          FILES_JSON: '{"index.html":"","styles.css":"","app.js":"","server.py":"","render.yaml":"c2VydmljZXM6CiAgLSB0eXBlOiB3ZWIKICAgIG5hbWU6IGtjNjY2LXN0b2NrLW1hc3RlcgogICAgcnVudGltZTogcHl0aG9uCiAgICBwbGFuOiBmcmVlCiAgICBidWlsZENvbW1hbmQ6IHBpcCBpbnN0YWxsIC1yIHJlcXVpcmVtZW50cy50eHQKICAgIHN0YXJ0Q29tbWFuZDogcHl0aG9uIHNlcnZlci5weQogICAgaGVhbHRoQ2hlY2tQYXRoOiAvCiAgICBhdXRvRGVwbG95OiB0cnVlCg==","requirements.txt":"IyBUaGlzIGFwcGxpY2F0aW9uIHVzZXMgb25seSB0aGUgUHl0aG9uIHN0YW5kYXJkIGxpYnJhcnkuCg==",".gitignore":"X19weWNhY2hlX18vCioucHlbY29kXQpvdXRwdXRzLwouRFNfU3RvcmUK"}'
        run: |
          python - <<'PY'
          import base64, json, os, pathlib
          for name, encoded in json.loads(os.environ["FILES_JSON"]).items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(base64.b64decode(encoded))
          PY
      - name: Commit project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Deploy KC 666 stock dashboard"
          git push
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4name: Bootstrap KC 666 and Deploy Pages

